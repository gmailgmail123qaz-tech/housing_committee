{% extends "base.html" %}
{% block title %}Регистрация — Жилищный комитет{% endblock %}
{% block content %}
<div class="page-body">
  <div class="container-narrow">
    <div style="max-width:480px;margin:0 auto;">
      <div class="page-title"><h1>Регистрация</h1><p>Создайте учётную запись для подачи обращений онлайн</p></div>
      <div class="card">
        <div class="card-body">
          <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
              <label class="form-label required">Полное имя (ФИО)</label>
              <input type="text" name="full_name" class="form-control" placeholder="Иванов Иван Иванович">
            </div>
            <div class="form-group">
              <label class="form-label required">Логин</label>
              <input type="text" name="username" class="form-control" required placeholder="Придумайте логин">
            </div>
            <div class="form-group">
              <label class="form-label required">Электронная почта</label>
              <input type="email" name="email" class="form-control" required placeholder="example@mail.ru">
            </div>
            <div class="form-group">
              <label class="form-label required">Пароль (минимум 6 символов)</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label required">Повторите пароль</label>
              <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
          </form>
          <p style="margin-top:16px;text-align:center;font-family:'PT Sans',sans-serif;font-size:14px;">
            Уже зарегистрированы? <a href="{{ url_for('login') }}" style="color:var(--gold);font-weight:700;">Войти</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
