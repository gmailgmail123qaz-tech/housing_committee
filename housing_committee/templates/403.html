{% extends "base.html" %}
{% block title %}Доступ запрещён — Жилищный комитет{% endblock %}
{% block content %}
<div class="page-body">
  <div class="container">
    <div class="error-page">
      <div class="error-code">403</div>
      <h1 class="error-title" style="margin-bottom:16px;">Доступ запрещён</h1>
      <p style="color:var(--text-muted);max-width:460px;margin:0 auto 28px;font-size:16px;">У вас недостаточно прав для просмотра этой страницы.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="{{ url_for('index') }}" class="btn btn-primary">← На главную</a>
        <a href="{{ url_for('login') }}" class="btn btn-secondary">Войти</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
