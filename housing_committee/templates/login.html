{% extends "base.html" %}
{% block title %}Вход — Жилищный комитет{% endblock %}
{% block content %}
<div class="page-body">
  <div class="container-narrow">
    <div style="max-width:420px;margin:0 auto;">
      <div class="page-title"><h1>Вход в личный кабинет</h1></div>
      <div class="card">
        <div class="card-body">
          <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
              <label class="form-label required">Логин</label>
              <input type="text" name="username" class="form-control" required autofocus placeholder="Введите логин">
            </div>
            <div class="form-group">
              <label class="form-label required">Пароль</label>
              <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
            </div>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
          </form>
          <p style="margin-top:16px;text-align:center;font-family:'PT Sans',sans-serif;font-size:14px;">
            Ещё нет аккаунта? <a href="{{ url_for('register') }}" style="color:var(--gold);font-weight:700;">Зарегистрироваться</a>
          </p>
        </div>
      </div>
      <div class="alert alert-info mt-3">
        <div>
          <strong>Тестовые учётные записи:</strong><br>
          Администратор: <code>admin</code> / <code>Admin2026!</code><br>
          Пользователь: <code>ivanov</code> / <code>User2026!</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
